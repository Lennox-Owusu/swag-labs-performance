name: JMeter Performance Tests - Swag Labs

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'   # daily at midnight UTC — runs all 5 tests
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test scenario to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load_medium
          - load_peak
          - stress
          - endurance
          - all

jobs:
  performance-test:
    name: Run JMeter - ${{ matrix.test }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false   # don't cancel other tests if one fails
      matrix:
        test: ${{ fromJson(
          github.event_name == 'schedule'     && '["baseline","load_medium","load_peak","stress","endurance"]' ||
          github.event.inputs.test_type == 'all' && '["baseline","load_medium","load_peak","stress","endurance"]' ||
          format('["{0}"]', github.event.inputs.test_type || 'baseline')
        ) }}

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Cache JMeter ──────────────────────────────────────────────────────
      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ~/jmeter
          key: jmeter-5.6.3

      # ── 4. Install JMeter ────────────────────────────────────────────────────
      - name: Install JMeter 5.6.3
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/jmeter
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz -C ~/jmeter --strip-components=1

      # ── 5. Resolve -J parameters for this scenario ───────────────────────────
      # Each scenario maps to: users | rampup | duration | think_time | think_deviation
      - name: Set scenario parameters
        id: params
        run: |
          case "${{ matrix.test }}" in
            baseline)
              echo "users=50"            >> $GITHUB_OUTPUT
              echo "rampup=120"          >> $GITHUB_OUTPUT
              echo "duration=600"        >> $GITHUB_OUTPUT
              echo "think_time=1000"     >> $GITHUB_OUTPUT
              echo "think_deviation=500" >> $GITHUB_OUTPUT
              ;;
            load_medium)
              echo "users=150"           >> $GITHUB_OUTPUT
              echo "rampup=300"          >> $GITHUB_OUTPUT
              echo "duration=1200"       >> $GITHUB_OUTPUT
              echo "think_time=1000"     >> $GITHUB_OUTPUT
              echo "think_deviation=500" >> $GITHUB_OUTPUT
              ;;
            load_peak)
              echo "users=300"           >> $GITHUB_OUTPUT
              echo "rampup=300"          >> $GITHUB_OUTPUT
              echo "duration=1200"       >> $GITHUB_OUTPUT
              echo "think_time=1000"     >> $GITHUB_OUTPUT
              echo "think_deviation=500" >> $GITHUB_OUTPUT
              ;;
            stress)
              echo "users=500"           >> $GITHUB_OUTPUT
              echo "rampup=180"          >> $GITHUB_OUTPUT
              echo "duration=900"        >> $GITHUB_OUTPUT
              echo "think_time=500"      >> $GITHUB_OUTPUT
              echo "think_deviation=200" >> $GITHUB_OUTPUT
              ;;
            endurance)
              echo "users=150"           >> $GITHUB_OUTPUT
              echo "rampup=300"          >> $GITHUB_OUTPUT
              echo "duration=3600"       >> $GITHUB_OUTPUT
              echo "think_time=1000"     >> $GITHUB_OUTPUT
              echo "think_deviation=500" >> $GITHUB_OUTPUT
              ;;
          esac

      # ── 6. Create output directories ─────────────────────────────────────────
      - name: Create output directories
        run: |
          mkdir -p results
          mkdir -p reports/${{ matrix.test }}

      # ── 7. Run JMeter using -J property flags ─────────────────────────────────
      # This is the correct, official JMeter approach.
      # No XML manipulation — values are injected at runtime via __P() functions.
      - name: Run JMeter - ${{ matrix.test }}
        run: |
          ~/jmeter/bin/jmeter \
            -n \
            -t SwagLabs_Performance_Test.jmx \
            -Jscenario=${{ matrix.test }} \
            -Jusers=${{ steps.params.outputs.users }} \
            -Jrampup=${{ steps.params.outputs.rampup }} \
            -Jduration=${{ steps.params.outputs.duration }} \
            -Jthink_time=${{ steps.params.outputs.think_time }} \
            -Jthink_deviation=${{ steps.params.outputs.think_deviation }} \
            -l results/${{ matrix.test }}.jtl \
            -e \
            -o reports/${{ matrix.test }} \
            -j results/${{ matrix.test }}.log
        timeout-minutes: 90

      # ── 8. Print live summary ─────────────────────────────────────────────────
      - name: Print test summary
        if: always()
        run: |
          echo "======================================================"
          echo " Scenario : ${{ matrix.test }}"
          echo " Users    : ${{ steps.params.outputs.users }}"
          echo " Duration : ${{ steps.params.outputs.duration }}s"
          echo "======================================================"
          if [ -f results/${{ matrix.test }}.jtl ]; then
            TOTAL=$(tail -n +2 results/${{ matrix.test }}.jtl | wc -l)
            ERRORS=$(awk -F',' 'NR>1 && $8=="false" {count++} END {print count+0}' results/${{ matrix.test }}.jtl)
            if [ "$TOTAL" -gt 0 ]; then
              ERROR_PCT=$(awk "BEGIN {printf \"%.2f\", $ERRORS*100/$TOTAL}")
              echo " Requests : $TOTAL"
              echo " Errors   : $ERRORS ($ERROR_PCT%)"
            fi
          fi

      # ── 9. Baseline pass/fail gate ────────────────────────────────────────────
      - name: Evaluate baseline thresholds
        if: matrix.test == 'baseline'
        run: |
          python3 - <<'EOF'
          import csv, sys

          with open('results/baseline.jtl') as f:
              rows = list(csv.DictReader(f))

          total  = len(rows)
          errors = sum(1 for r in rows if r.get('success','true').lower() == 'false')
          avg_rt = sum(int(r.get('elapsed',0)) for r in rows) / total if total else 0

          err_rate = (errors / total * 100) if total else 0
          print(f"Total requests : {total}")
          print(f"Error rate     : {err_rate:.2f}%  (threshold: <1%)")
          print(f"Avg response   : {avg_rt:.0f}ms  (target: <2000ms)")

          if err_rate > 1.0:
              print("FAIL: error rate exceeds 1% threshold")
              sys.exit(1)
          print("PASS: error rate within threshold")
          EOF

      # ── 10. Upload HTML report ────────────────────────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-${{ matrix.test }}-run${{ github.run_number }}
          path: reports/${{ matrix.test }}/
          retention-days: 30

      # ── 11. Upload JTL results ────────────────────────────────────────────────
      - name: Upload JTL results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jtl-${{ matrix.test }}-run${{ github.run_number }}
          path: results/${{ matrix.test }}.jtl
          retention-days: 30

  # ── Summary job ──────────────────────────────────────────────────────────────
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: performance-test
    if: always()

    steps:
      - name: Download all JTL files
        uses: actions/download-artifact@v4
        with:
          pattern: jtl-*
          merge-multiple: true
          path: results/

      - name: Write GitHub summary
        run: |
          echo "# JMeter Performance Results — Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scenario | Users | Requests | Error Rate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|----------|------------|--------|" >> $GITHUB_STEP_SUMMARY

          declare -A USER_MAP=(
            ["baseline"]="50"
            ["load_medium"]="150"
            ["load_peak"]="300"
            ["stress"]="500"
            ["endurance"]="150 / 60 min"
          )

          for TEST in baseline load_medium load_peak stress endurance; do
            FILE="results/${TEST}.jtl"
            USERS="${USER_MAP[$TEST]}"
            if [ -f "$FILE" ]; then
              TOTAL=$(tail -n +2 "$FILE" | wc -l)
              ERRORS=$(awk -F',' 'NR>1 && $8=="false" {c++} END {print c+0}' "$FILE")
              PCT=$(awk "BEGIN {printf \"%.2f\", ($TOTAL>0)?$ERRORS*100/$TOTAL:0}")
              STATUS=$(awk "BEGIN {print ($PCT+0 <= 1.0) ? \"✅ PASS\" : \"❌ FAIL\"}")
              echo "| $TEST | $USERS | $TOTAL | ${PCT}% | $STATUS |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| $TEST | $USERS | — | — | ⏭️ Skipped |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Triggered by: \`${{ github.event_name }}\` | Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
