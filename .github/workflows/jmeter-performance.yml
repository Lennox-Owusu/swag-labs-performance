name: JMeter Performance Tests - Swag Labs

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Test type to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load_medium
          - load_peak
          - stress
          - endurance
          - all

jobs:
  performance-test:
    name: Run JMeter Performance Tests
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Each test runs as a separate job
        test: ${{ fromJson(github.event.inputs.test_type == 'all' && '["baseline","load_medium","load_peak","stress","endurance"]' || format('["{0}"]', github.event.inputs.test_type || 'baseline')) }}

    steps:
      # ── 1. Checkout repository ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (JMeter requires Java 8+) ────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Cache JMeter installation ────────────────────────────────────────
      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: ~/jmeter
          key: jmeter-5.6.3

      # ── 4. Download and install JMeter if not cached ────────────────────────
      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/jmeter
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz -C ~/jmeter --strip-components=1
          echo "JMeter installed successfully"
          ~/jmeter/bin/jmeter --version

      # ── 5. Create results and reports directories ───────────────────────────
      - name: Create output directories
        run: |
          mkdir -p results
          mkdir -p reports/${{ matrix.test }}

      # ── 6. Enable the correct Thread Group in the JMX file ─────────────────
      - name: Configure test - Enable ${{ matrix.test }} thread group
        run: |
          TEST="${{ matrix.test }}"
          JMX="SwagLabs_Performance_Test.jmx"

          # Map test names to thread group names in the JMX
          declare -A TG_MAP=(
            ["baseline"]="TG1 - Baseline"
            ["load_medium"]="TG2 - Load Medium"
            ["load_peak"]="TG3 - Load Peak"
            ["stress"]="TG4 - Stress"
            ["endurance"]="TG5 - Endurance"
          )

          TARGET_TG="${TG_MAP[$TEST]}"
          echo "Enabling thread group: $TARGET_TG"

          # Disable all thread groups first, then enable the target one
          python3 - <<'EOF'
          import xml.etree.ElementTree as ET
          import sys
          import os

          test = os.environ.get('TEST_TYPE', 'baseline')
          tg_map = {
              'baseline': 'TG1 - Baseline',
              'load_medium': 'TG2 - Load Medium',
              'load_peak': 'TG3 - Load Peak',
              'stress': 'TG4 - Stress',
              'endurance': 'TG5 - Endurance'
          }
          target = tg_map.get(test, 'TG1 - Baseline')

          tree = ET.parse('SwagLabs_Performance_Test.jmx')
          root = tree.getroot()

          for tg in root.iter('ThreadGroup'):
              name = tg.get('testname', '')
              if target in name:
                  tg.set('enabled', 'true')
                  print(f"Enabled: {name}")
              else:
                  tg.set('enabled', 'false')
                  print(f"Disabled: {name}")

          tree.write('SwagLabs_Performance_Test.jmx', xml_declaration=True, encoding='UTF-8')
          print("JMX file updated successfully")
          EOF
        env:
          TEST_TYPE: ${{ matrix.test }}

      # ── 7. Run the JMeter test ───────────────────────────────────────────────
      - name: Run JMeter - ${{ matrix.test }}
        run: |
          ~/jmeter/bin/jmeter \
            -n \
            -t SwagLabs_Performance_Test.jmx \
            -l results/${{ matrix.test }}.jtl \
            -e \
            -o reports/${{ matrix.test }} \
            -j results/${{ matrix.test }}.log
        timeout-minutes: 90

      # ── 8. Display summary results ───────────────────────────────────────────
      - name: Display test summary
        if: always()
        run: |
          echo "=========================================="
          echo "Test: ${{ matrix.test }}"
          echo "=========================================="
          if [ -f results/${{ matrix.test }}.jtl ]; then
            TOTAL=$(tail -n +2 results/${{ matrix.test }}.jtl | wc -l)
            ERRORS=$(tail -n +2 results/${{ matrix.test }}.jtl | awk -F',' '$8=="false"' | wc -l)
            if [ "$TOTAL" -gt 0 ]; then
              ERROR_RATE=$(echo "scale=2; $ERRORS * 100 / $TOTAL" | bc)
            else
              ERROR_RATE=0
            fi
            echo "Total Requests : $TOTAL"
            echo "Errors         : $ERRORS"
            echo "Error Rate     : ${ERROR_RATE}%"
          fi

      # ── 9. Check pass/fail thresholds ────────────────────────────────────────
      - name: Evaluate performance thresholds
        if: matrix.test == 'baseline'
        run: |
          echo "Checking baseline performance thresholds..."
          python3 - <<'EOF'
          import csv

          results_file = 'results/baseline.jtl'
          thresholds = {
              'max_error_rate': 1.0,      # < 1% error rate
              'max_avg_response': 2000,   # < 2000ms average response time
          }

          total = 0
          errors = 0
          total_elapsed = 0

          with open(results_file, 'r') as f:
              reader = csv.DictReader(f)
              for row in reader:
                  total += 1
                  if row.get('success', 'true').lower() == 'false':
                      errors += 1
                  total_elapsed += int(row.get('elapsed', 0))

          if total == 0:
              print("No results found!")
              exit(1)

          error_rate = (errors / total) * 100
          avg_response = total_elapsed / total

          print(f"Error Rate   : {error_rate:.2f}% (threshold: <{thresholds['max_error_rate']}%)")
          print(f"Avg Response : {avg_response:.0f}ms (threshold: <{thresholds['max_avg_response']}ms)")

          failed = False
          if error_rate > thresholds['max_error_rate']:
              print(f"FAIL: Error rate {error_rate:.2f}% exceeds threshold {thresholds['max_error_rate']}%")
              failed = True
          else:
              print(f"PASS: Error rate within threshold")

          # Note: avg response expected to exceed on demo server - informational only
          if avg_response > thresholds['max_avg_response']:
              print(f"WARN: Avg response {avg_response:.0f}ms exceeds target (demo server limitation)")
          else:
              print(f"PASS: Avg response within threshold")

          if failed:
              exit(1)
          EOF

      # ── 10. Upload HTML report as artifact ───────────────────────────────────
      - name: Upload HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-report-${{ matrix.test }}-${{ github.run_number }}
          path: reports/${{ matrix.test }}/
          retention-days: 30

      # ── 11. Upload JTL results file ───────────────────────────────────────────
      - name: Upload JTL results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-jtl-${{ matrix.test }}-${{ github.run_number }}
          path: results/${{ matrix.test }}.jtl
          retention-days: 30

      # ── 12. Upload JMeter log ─────────────────────────────────────────────────
      - name: Upload JMeter log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-log-${{ matrix.test }}-${{ github.run_number }}
          path: results/${{ matrix.test }}.log
          retention-days: 7

  # ── Summary job: runs after all matrix jobs complete ──────────────────────
  summary:
    name: Performance Test Summary
    runs-on: ubuntu-latest
    needs: performance-test
    if: always()

    steps:
      - name: Download all JTL artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: jmeter-jtl-*
          merge-multiple: true
          path: results/

      - name: Generate summary report
        run: |
          echo "# JMeter Performance Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Status | Artifacts |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|-----------|" >> $GITHUB_STEP_SUMMARY

          for TEST in baseline load_medium load_peak stress endurance; do
            if [ -f "results/${TEST}.jtl" ]; then
              TOTAL=$(tail -n +2 results/${TEST}.jtl | wc -l)
              ERRORS=$(tail -n +2 results/${TEST}.jtl | awk -F',' 'NR>1 && $8=="false"' | wc -l)
              if [ "$TOTAL" -gt 0 ]; then
                ERROR_RATE=$(echo "scale=1; $ERRORS * 100 / $TOTAL" | bc)
                echo "| $TEST | ✅ ${ERROR_RATE}% errors | [Download](../actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "| $TEST | ⏭️ Skipped | - |" >> $GITHUB_STEP_SUMMARY
            fi
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Run #${{ github.run_number }} | Triggered by: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
